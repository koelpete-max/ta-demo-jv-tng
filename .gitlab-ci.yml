image: mcr.microsoft.com/playwright/java:v1.56.0-jammy

stages:
  - test

variables:
  MAVEN_CLI_OPTS: "-B"
  BASE_URL: "https://www.postfinance.ch/ap/ga/ob/html/finance"
  HEADLESS: "true"
  LANGUAGE: "DE"
#  CHECK_WIZARD: "true"

ui_tests:
  stage: test
  script:
    - echo "BASE_URL = $BASE_URL"
    - echo "HEADLESS = $HEADLESS"
    - echo "LANGUAGE = $LANGUAGE"
    - curl -I "$BASE_URL" || echo "curl failed"

    # 1) Tests ausführen, Allure-Results nach target/allure-results
    - mvn $MAVEN_CLI_OPTS clean test -Dlang=$LANGUAGE -Dallure.results.directory=target/allure-results

    # 2) Allure-HTML-Report generieren (explizit mit GAV)
    - mvn $MAVEN_CLI_OPTS io.qameta.allure:allure-maven:2.12.0:report \
      -Dallure.results.directory=target/allure-results \
      -Dallure.report.directory=target/site/allure-maven-plugin

  artifacts:
    when: always
    expire_in: 14 days
    reports:
      junit:
        - target/surefire-reports/*.xml
    paths:
      - target/surefire-reports/
      - test-output/
      - target/allure-results/
      - target/site/allure-maven-plugin/
