image: mcr.microsoft.com/playwright/java:v1.56.0-jammy

stages:
  - test

variables:
  MAVEN_CLI_OPTS: "-B"
  BASE_URL: "https://www.postfinance.ch/ap/ga/ob/html/finance"
  HEADLESS: "true"
  LANGUAGE: "DE"
#  CHECK_WIZARD: "true"

ui_tests:
  stage: test
  script:
    - echo "BASE_URL = $BASE_URL"
    - echo "HEADLESS = $HEADLESS"
    - echo "LANGUAGE = $LANGUAGE"
    - mvn $MAVEN_CLI_OPTS clean test -Dsurefire.suiteXmlFiles=testng.xml -Dlang=$LANGUAGE


  artifacts:
    when: always
    expire_in: 14 days
    reports:
      junit:
        - target/surefire-reports/*.xml
    paths:
      - target/surefire-reports/
      - target/surefire-reports/
      - test-output/